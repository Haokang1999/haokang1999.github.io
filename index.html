<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>傅豪康 | Fu Haokang</title>
    <meta
      name="description"
      content="傅豪康个人网站，中英文双语呈现中国画创作、版画研究、展览履历与作品集。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <div class="site-shell">
      <div class="noise"></div>
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="Fu Haokang home">
          <img src="./assets/monogram.svg" alt="" />
          <span>FU HAO KANG</span>
        </a>
        <div class="topbar-actions">
          <nav class="topnav" aria-label="Section navigation">
            <a href="#about" data-nav="about"></a>
            <a href="#education" data-nav="education"></a>
            <a href="#research" data-nav="research"></a>
            <a href="#portfolio" data-nav="portfolio"></a>
            <a href="#exhibitions" data-nav="exhibitions"></a>
            <a href="#contact" data-nav="contact"></a>
          </nav>
          <button class="lang-toggle" type="button" aria-live="polite">EN</button>
        </div>
      </header>

      <main id="home">
        <section class="hero panel">
          <div class="hero-copy">
            <p class="eyebrow" data-field="heroEyebrow"></p>
            <h1 data-field="heroTitle"></h1>
            <p class="hero-lead" data-field="heroLead"></p>
          </div>
          <div class="hero-meta">
            <figure class="portrait-card">
              <img src="./assets/portrait.jpg" alt="Portrait of Fu Haokang" />
            </figure>
            <div class="hero-card">
              <span class="card-label" data-field="metaCurrentLabel"></span>
              <p data-field="metaCurrentValue"></p>
            </div>
            <div class="hero-card">
              <span class="card-label" data-field="metaFocusLabel"></span>
              <p data-field="metaFocusValue"></p>
            </div>
            <div class="hero-card">
              <span class="card-label" data-field="metaLocationLabel"></span>
              <p data-field="metaLocationValue"></p>
            </div>
          </div>
        </section>

        <section class="intro-grid">
          <article class="panel statement" id="about">
            <p class="section-index">01</p>
            <h2 data-field="aboutTitle"></h2>
            <p class="statement-text" data-field="aboutBody"></p>
          </article>

          <aside class="panel quickfacts">
            <p class="section-index">02</p>
            <h2 data-field="factsTitle"></h2>
            <ul id="facts-list"></ul>
          </aside>
        </section>

        <section class="panel timeline-section" id="education">
          <div class="section-heading">
            <p class="section-index">03</p>
            <h2 data-field="educationTitle"></h2>
          </div>
          <div class="timeline" id="education-list"></div>
        </section>

        <section class="panel split-section" id="research">
          <div class="section-heading">
            <p class="section-index">04</p>
            <h2 data-field="researchTitle"></h2>
          </div>
          <div class="split-columns">
            <div>
              <h3 data-field="publicationsTitle"></h3>
              <div class="stack-list" id="publications-list"></div>
            </div>
            <div>
              <h3 data-field="projectsTitle"></h3>
              <div class="stack-list" id="projects-list"></div>
            </div>
          </div>
        </section>

        <section class="panel split-section">
          <div class="section-heading">
            <p class="section-index">05</p>
            <h2 data-field="practiceTitle"></h2>
          </div>
          <div class="split-columns">
            <div>
              <h3 data-field="affiliationsTitle"></h3>
              <ul class="tag-list" id="affiliations-list"></ul>
            </div>
            <div>
              <h3 data-field="skillsTitle"></h3>
              <ul class="tag-list" id="skills-list"></ul>
            </div>
          </div>
        </section>

        <section class="panel portfolio-home" id="portfolio">
          <div class="section-heading">
            <div>
              <p class="section-index">06</p>
              <h2 data-field="portfolioTitle"></h2>
            </div>
            <a class="section-link" href="./portfolio.html" data-field="portfolioLink"></a>
          </div>
          <p class="portfolio-intro" data-field="portfolioLead"></p>
          <div class="portfolio-grid" id="portfolio-preview"></div>
        </section>

        <section class="panel exhibitions-section" id="exhibitions">
          <div class="section-heading">
            <p class="section-index">07</p>
            <h2 data-field="exhibitionsTitle"></h2>
          </div>
          <div class="exhibition-feature">
            <p class="feature-kicker" data-field="featureKicker"></p>
            <h3 data-field="featureTitle"></h3>
            <p data-field="featureBody"></p>
          </div>
          <div class="timeline compact" id="exhibitions-list"></div>
        </section>

        <section class="contact-band panel" id="contact">
          <div>
            <p class="section-index">08</p>
            <h2 data-field="contactTitle"></h2>
            <p data-field="contactLead"></p>
          </div>
          <div class="contact-actions">
            <a id="email-link" class="contact-link" href=""></a>
            <a id="phone-link" class="contact-link" href=""></a>
          </div>
        </section>
      </main>
    </div>

    <script src="./site-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
